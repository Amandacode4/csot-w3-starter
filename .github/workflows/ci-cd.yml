name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  test-and-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
      - name: Lint with ruff
        run: ruff check .
      - name: Run tests with pytest
        run: DATABASE_URL="sqlite:///:memory:" python -m pytest --cov=app --cov-fail-under=70 tests/

  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: TruffleHog Secret Scan
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --only-verified
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Pip Audit
        run: |
          pip install pip-audit
          pip-audit -r requirements.txt || true # don't fail CI if vulnerabilities exist for now

  build-and-push:
    needs: [test-and-lint, security-scan]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set lowercase repo name
        run: echo "REPO_LOWER=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/${{ env.REPO_LOWER }}/csot-w3-app:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_PASSWORD }}" > ~/.ssh/password
          # We'll use sshpass
      - name: Deploy to sandbox
        env:
          SSHPASS: ${{ secrets.DEPLOY_PASSWORD }}
        run: |
          sudo apt-get update && sudo apt-get install -y sshpass
          export REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          sshpass -e ssh -o StrictHostKeyChecking=no -p ${{ secrets.DEPLOY_SSH_PORT }} ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} << EOF
          cd ${{ secrets.DEPLOY_PATH }}
          mkdir -p instance
          cat << 'INNER' > compose.yaml
          services:
            web:
              image: ghcr.io/$REPO_LOWER/csot-w3-app:latest
              ports:
                - "0:80"
              volumes:
                - ./instance:/app/instance
              restart: always
              network_mode: bridge
          INNER
          docker compose -p ${{ secrets.COMPOSE_PROJECT_NAME }} pull
          docker compose -p ${{ secrets.COMPOSE_PROJECT_NAME }} up -d
          EOF
