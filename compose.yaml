services:
  web:
    build: .
    image: ghcr.io/${GITHUB_REPOSITORY:-local}/csot-w3-app:latest
    ports:
      - "0:80"
    volumes:
      - sqlite_data:/app/instance
    restart: always

  watchtower:
    image: containrrr/watchtower
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - DOCKER_API_VERSION=1.40
    command: --interval 15
    restart: always

volumes:
  sqlite_data:
